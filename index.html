<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona Główna - Moje Projekty</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: #4a86e8;
        }
        .card h2 {
            margin: 0;
            font-size: 2rem;
            color: #4a86e8;
        }
        .card p {
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Witaj w moich projektach!</h1>
    
    <div class="container">
        <a href="/Elektronika/" class="card">
            <h2>A</h2>
            <p>Projekt A (Kalkulator)</p>
        </a>
        <a href="/Pola figur/" class="card">
            <h2>B</h2>
            <p>Opis projektu B</p>
        </a>
        <a href="/Operacje na ułamakch/" class="card">
            <h2>C</h2>
            <p>Opis projektu C</p>
        </a>
    </div>
</body>
</html>
